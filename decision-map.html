<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>真实决策地图 · Real Decision Maps</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

:root {
  --bg: #0c1017;
  --bg-card: rgba(18, 24, 38, 0.92);
  --bg-hover: rgba(28, 38, 58, 0.95);
  --gold: #d4a853;
  --gold-light: #f0d48a;
  --gold-dim: rgba(212, 168, 83, 0.3);
  --blue: #5b9aff;
  --green: #34d399;
  --red: #f87171;
  --purple: #a78bfa;
  --cyan: #22d3ee;
  --orange: #fb923c;
  --text: #d4dae6;
  --text-dim: #7a8498;
  --text-bright: #f0f2f7;
  --border: rgba(212, 168, 83, 0.12);
  --glow: 0 0 24px rgba(212, 168, 83, 0.25);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

.header {
  text-align: center;
  padding: 32px 20px 12px;
}
.header h1 {
  font-family: 'Noto Serif SC', serif;
  font-size: 34px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--gold-light), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 3px;
}
.header p {
  color: var(--text-dim);
  font-size: 13px;
  margin-top: 6px;
  font-weight: 300;
}

/* ===== MODE BAR ===== */
.mode-bar {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 12px 20px 16px;
  flex-wrap: wrap;
}
.mode-btn {
  padding: 8px 20px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
  font-family: 'Noto Sans SC', sans-serif;
  transition: all 0.25s;
}
.mode-btn:hover { border-color: var(--gold-dim); background: var(--bg-hover); }
.mode-btn.active {
  border-color: var(--gold);
  background: rgba(212, 168, 83, 0.12);
  color: var(--gold-light);
  box-shadow: var(--glow);
}

/* ===== CATEGORY FILTER BAR ===== */
.category-bar {
  display: none;
  justify-content: center;
  gap: 8px;
  padding: 0 20px 14px;
  flex-wrap: wrap;
  max-width: 1200px;
  margin: 0 auto;
}
.category-bar.visible { display: flex; }
.cat-chip {
  padding: 5px 14px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
  color: var(--text-dim);
  font-size: 12px;
  cursor: pointer;
  font-family: 'Noto Sans SC', sans-serif;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 5px;
}
.cat-chip:hover { background: rgba(255,255,255,0.08); color: var(--text); }
.cat-chip.active {
  border-color: var(--gold);
  background: rgba(212, 168, 83, 0.12);
  color: var(--gold-light);
}
.cat-chip .cat-count {
  font-size: 10px;
  opacity: 0.6;
}



/* ===== UNIFIED MAP ===== */
.unified-map {
  display: none;
  max-width: 1500px;
  margin: 0 auto;
  padding: 0 20px 40px;
}
.unified-map.active { display: block; }

.map-wrapper {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}

/* Map header: age axis */
.map-header {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: rgba(10, 14, 26, 0.7);
}
.map-header-label {
  width: 150px;
  min-width: 150px;
  padding: 12px 14px;
  font-size: 11px;
  color: var(--text-dim);
  font-weight: 600;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  border-right: 1px solid var(--border);
}
.map-age-axis {
  flex: 1;
  position: relative;
  height: 42px;
}
.map-age-tick {
  position: absolute;
  bottom: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  transform: translateX(-50%);
}
.map-age-tick .tick-line {
  width: 1px;
  height: 10px;
  background: rgba(212,168,83,0.4);
}
.map-age-tick .tick-label {
  font-size: 11px;
  color: var(--gold-light);
  white-space: nowrap;
  font-weight: 600;
  margin-top: 2px;
}
.map-age-tick .tick-sublabel {
  font-size: 9px;
  color: var(--text-dim);
  margin-top: 1px;
}

/* Map body */
.map-body {
  display: flex;
  overflow-x: auto;
}
.map-body::-webkit-scrollbar { height: 6px; }
.map-body::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 3px; }

/* Person labels column */
.map-person-col {
  width: 150px;
  min-width: 150px;
  border-right: 1px solid var(--border);
  background: rgba(10, 14, 26, 0.5);
  position: sticky;
  left: 0;
  z-index: 5;
}
.map-person-item {
  height: 90px;
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  cursor: pointer;
  transition: background 0.2s;
}
.map-person-item:hover { background: rgba(212,168,83,0.06); }
.map-person-item .mpi-avatar { font-size: 22px; flex-shrink: 0; }
.map-person-item .mpi-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-bright);
  white-space: nowrap;
}
.map-person-item .mpi-era {
  font-size: 9px;
  color: var(--text-dim);
  margin-top: 1px;
}
.map-person-item .mpi-color-bar {
  width: 3px;
  height: 24px;
  border-radius: 2px;
  flex-shrink: 0;
  margin-left: auto;
}

/* Timeline area */
.map-timeline {
  flex: 1;
  position: relative;
  min-width: 900px;
}

/* Grid lines */
.map-grid-line {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 1px;
  background: rgba(212,168,83,0.06);
  pointer-events: none;
}

/* Life stage bands */
.life-stage-band {
  position: absolute;
  top: 0;
  bottom: 0;
  pointer-events: none;
  opacity: 0.04;
}

/* Person row */
.map-row {
  height: 90px;
  position: relative;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  transition: background 0.2s;
}
.map-row:hover { background: rgba(212,168,83,0.02); }

/* Life span bar */
.life-bar {
  position: absolute;
  top: 8px;
  height: 4px;
  border-radius: 2px;
  opacity: 0.3;
}

/* Decision dots with labels */
.map-decision-group {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  z-index: 3;
  transition: all 0.2s;
}
.map-decision-group:hover {
  z-index: 10;
  transform: translate(-50%, -50%) scale(1.15);
}

.map-dot {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 2.5px solid var(--bg);
  transition: all 0.2s;
}
.map-decision-group:hover .map-dot {
  box-shadow: 0 0 14px rgba(255,255,255,0.3);
}
.map-dot.dot-good { background: var(--green); }
.map-dot.dot-bad { background: var(--red); }
.map-dot.dot-mixed { background: var(--orange); }

/* Category label shown directly on map */
.map-cat-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  margin-top: 3px;
  padding: 1px 6px;
  border-radius: 8px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  max-width: 80px;
  overflow: hidden;
  text-overflow: ellipsis;
  text-align: center;
}
.map-decision-group:hover .map-cat-label {
  background: rgba(212,168,83,0.15);
  border-color: rgba(212,168,83,0.3);
  color: var(--gold-light);
}

/* Year sub-label */
.map-year-label {
  font-size: 8px;
  color: var(--text-dim);
  margin-top: 1px;
  opacity: 0.7;
}

/* Map legend */
.map-legend {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 12px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-dim);
  flex-wrap: wrap;
}
.map-legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
}
.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}
.legend-dot.lg-good { background: var(--green); }
.legend-dot.lg-bad { background: var(--red); }
.legend-dot.lg-mixed { background: var(--orange); }

/* ===== DETAIL PANEL (slides in from right) ===== */
.detail-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 100;
}
.detail-overlay.visible { display: block; }

.detail-panel {
  position: fixed;
  top: 0;
  right: -460px;
  width: 440px;
  max-width: 90vw;
  height: 100vh;
  background: var(--bg);
  border-left: 1px solid var(--border);
  z-index: 101;
  overflow-y: auto;
  transition: right 0.3s ease;
  padding: 24px;
}
.detail-panel.visible { right: 0; }
.detail-panel::-webkit-scrollbar { width: 4px; }
.detail-panel::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

.detail-close {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-dim);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.detail-close:hover { border-color: var(--gold); color: var(--gold); }

.detail-person-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.detail-person-header .dph-avatar { font-size: 36px; }
.detail-person-header .dph-name {
  font-family: 'Noto Serif SC', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--text-bright);
}
.detail-person-header .dph-info {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 2px;
}

.detail-context {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-bright);
  margin-bottom: 16px;
  line-height: 1.5;
}

.detail-options {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 20px;
}
.detail-option {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  line-height: 1.5;
}
.detail-option.not-chosen {
  background: rgba(255,255,255,0.02);
  color: var(--text-dim);
  border: 1px solid rgba(255,255,255,0.04);
}
.detail-option.is-chosen {
  background: rgba(212,168,83,0.08);
  color: var(--text);
  border: 1px solid rgba(212,168,83,0.25);
}
.detail-option .do-marker {
  flex-shrink: 0;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  margin-top: 1px;
}
.detail-option.not-chosen .do-marker {
  background: rgba(255,255,255,0.06);
  color: var(--text-dim);
}
.detail-option.is-chosen .do-marker {
  background: var(--gold);
  color: var(--bg);
}

.detail-outcome-box {
  padding: 14px 16px;
  background: rgba(255,255,255,0.02);
  border-radius: 8px;
  border-left: 3px solid var(--gold-dim);
  margin-bottom: 16px;
}
.detail-outcome-box .dob-label {
  font-size: 11px;
  color: var(--gold);
  font-weight: 600;
  margin-bottom: 6px;
}
.detail-outcome-box .dob-text {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.7;
}

.detail-insight-box {
  padding: 12px 16px;
  background: rgba(167,139,250,0.06);
  border-radius: 8px;
  border-left: 3px solid rgba(167,139,250,0.3);
}
.detail-insight-box .dib-label {
  font-size: 11px;
  color: var(--purple);
  font-weight: 600;
  margin-bottom: 4px;
}
.detail-insight-box .dib-text {
  font-size: 13px;
  color: var(--purple);
  font-style: italic;
  line-height: 1.6;
}

/* Same-category cross-person comparison */
.detail-compare-section {
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}
.detail-compare-section h4 {
  font-family: 'Noto Serif SC', serif;
  font-size: 14px;
  color: var(--gold);
  margin-bottom: 12px;
}
.compare-person-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 8px;
  background: rgba(255,255,255,0.02);
  margin-bottom: 8px;
  border: 1px solid rgba(255,255,255,0.04);
}
.compare-person-row .cpr-avatar { font-size: 20px; flex-shrink: 0; margin-top: 2px; }
.compare-person-row .cpr-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-bright);
  margin-bottom: 2px;
}
.compare-person-row .cpr-context {
  font-size: 11px;
  color: var(--text-dim);
  line-height: 1.5;
}
.compare-person-row .cpr-choice {
  font-size: 11px;
  color: var(--green);
  margin-top: 4px;
  padding: 2px 8px;
  background: rgba(52,211,153,0.08);
  border-radius: 4px;
  display: inline-block;
}

/* ===== SCORE CURVE VIEW ===== */
.curve-layout {
  display: none;
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 20px 40px;
}
.curve-layout.active { display: block; }

.curve-controls {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 20px;
}

.control-group {
  margin-bottom: 16px;
}
.control-group:last-child { margin-bottom: 0; }

.control-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--gold-light);
  margin-bottom: 10px;
}

.person-checkboxes,
.dimension-checkboxes {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.person-checkbox,
.dimension-checkbox {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.02);
  cursor: pointer;
  transition: all 0.2s;
  font-size: 12px;
}
.person-checkbox:hover,
.dimension-checkbox:hover {
  background: rgba(255,255,255,0.05);
  border-color: var(--gold-dim);
}
.person-checkbox input,
.dimension-checkbox input {
  cursor: pointer;
}
.person-checkbox.checked,
.dimension-checkbox.checked {
  background: rgba(212,168,83,0.12);
  border-color: var(--gold);
  color: var(--gold-light);
}

.curve-chart-container {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  overflow-x: auto;
}

#scoreCurveCanvas {
  display: block;
  max-width: 100%;
  height: auto;
}

.curve-legend {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 16px;
  flex-wrap: wrap;
  font-size: 12px;
  color: var(--text-dim);
}

.curve-legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
}

.legend-line {
  width: 30px;
  height: 3px;
  border-radius: 2px;
}

/* Color mode selector */
.color-mode-selector {
  display: flex;
  gap: 8px;
}

.color-mode-btn {
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.02);
  color: var(--text-dim);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Noto Sans SC', sans-serif;
}

.color-mode-btn:hover {
  background: rgba(255,255,255,0.05);
  border-color: var(--gold-dim);
}

.color-mode-btn.active {
  background: rgba(212,168,83,0.12);
  border-color: var(--gold);
  color: var(--gold-light);
}

/* ===== SINGLE PERSON DECISION PATH VIEW ===== */
.main-layout {
  display: none;
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 20px 40px;
}
.main-layout.active { display: block; }

.single-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.single-avatar {
  font-size: 48px;
  width: 72px;
  height: 72px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(212,168,83,0.08);
  border-radius: 50%;
  border: 2px solid var(--gold-dim);
}
.single-info h2 {
  font-family: 'Noto Serif SC', serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--text-bright);
}
.single-info .subtitle { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
.single-info .lifespan { font-size: 12px; color: var(--gold); margin-top: 4px; }

/* Decision path map */
.decision-path-map {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow-x: auto;
  overflow-y: visible;
  position: relative;
}

/* Age axis header */
.path-age-axis {
  position: relative;
  height: 50px;
  border-bottom: 1px solid var(--border);
  background: rgba(10, 14, 26, 0.7);
  min-width: 1400px;
}
.path-age-tick {
  position: absolute;
  bottom: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  transform: translateX(-50%);
}
.path-age-tick .tick-line {
  width: 1px;
  height: 12px;
  background: rgba(212,168,83,0.5);
}
.path-age-tick .tick-label {
  font-size: 12px;
  color: var(--gold-light);
  font-weight: 600;
  margin-top: 4px;
}

/* Path body */
.path-body {
  position: relative;
  min-height: 900px;
  padding: 40px 40px 80px;
  min-width: 1400px;
}

/* SVG path line */
.path-svg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1;
}

/* Decision column - positioned by age */
.decision-column {
  position: absolute;
  top: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  z-index: 2;
  width: 220px;
}

/* Decision context label at top */
.decision-context-label {
  font-size: 12px;
  color: var(--text-bright);
  text-align: center;
  line-height: 1.4;
  z-index: 3;
  padding: 6px 12px;
  background: rgba(212,168,83,0.08);
  border-radius: 10px;
  border: 1px solid rgba(212,168,83,0.2);
  font-weight: 600;
  margin-bottom: 16px;
}

/* Options container - vertical stack */
.options-stack {
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: stretch;
  z-index: 3;
  width: 100%;
}

/* Option node */
.option-node {
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 12px;
  line-height: 1.5;
  cursor: default;
  transition: all 0.2s;
  position: relative;
}
.option-node.not-chosen {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-dim);
  opacity: 0.6;
}
.option-node.is-chosen {
  background: rgba(212,168,83,0.12);
  border: 2px solid var(--gold);
  color: var(--gold-light);
  font-weight: 600;
  box-shadow: 0 0 20px rgba(212,168,83,0.4);
  opacity: 1;
}
.option-node .opt-label {
  font-size: 10px;
  color: var(--text-dim);
  margin-bottom: 4px;
  font-weight: 500;
}
.option-node.is-chosen .opt-label {
  color: var(--gold);
}
.option-node .opt-text {
  font-size: 12px;
  line-height: 1.5;
}

/* Metrics panel for chosen option */
.metrics-panel {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid rgba(212,168,83,0.2);
}
.metric-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
  font-size: 11px;
}
.metric-label {
  color: var(--text-dim);
  display: flex;
  align-items: center;

// ===== STATE =====
let currentMode = 'map'; // 'map' | 'single'
let currentPerson = 'jackma';
let activeCategory = null; // null = show all

// Person order: ancient first, then modern
function getOrderedPeople() {
  const ancient = Object.entries(people).filter(([_, p]) => p.era === 'ancient');
  const modern = Object.entries(people).filter(([_, p]) => p.era === 'modern');
  return [...ancient, ...modern];
}

const personColors = {
  susshi: '#a78bfa',
  zengguofan: '#fb923c',
  zhangyimou: '#f472b6',
  stevejobs: '#34d399',
  jackma: '#5b9aff',
  taoyuanming: '#86efac',
  teresa: '#fbbf24',
  thoreau: '#60a5fa'
};

// ===== AGE AXIS CONFIG =====
const AGE_MIN = 15;
const AGE_MAX = 70;
const AGE_TICKS = [20, 25, 30, 35, 40, 45, 50, 55, 60, 65];
const AGE_SPAN = AGE_MAX - AGE_MIN;

function ageToPct(age) {
  return Math.max(2, Math.min(98, ((age - AGE_MIN) / AGE_SPAN) * 100));
}

// ===== MODE SWITCHING =====
function setMode(mode) {
  currentMode = mode;
  document.getElementById('mapModeBtn').classList.toggle('active', mode === 'map');
  document.getElementById('singleModeBtn').classList.toggle('active', mode === 'single');
  document.getElementById('curveModeBtn').classList.toggle('active', mode === 'curve');
  document.getElementById('unifiedMap').classList.toggle('active', mode === 'map');
  document.getElementById('mainLayout').classList.toggle('active', mode === 'single');
  document.getElementById('curveLayout').classList.toggle('active', mode === 'curve');
  document.getElementById('categoryBar').classList.toggle('visible', mode === 'map');
  if (mode === 'map') renderMap();
  if (mode === 'single') renderSinglePerson();
  if (mode === 'curve') initCurveView();
}

// ===== CATEGORY BAR =====
function renderCategoryBar() {
  const bar = document.getElementById('categoryBar');
  // Count how many decisions per category
  const catCounts = {};
  Object.values(people).forEach(p => {
    p.decisions.forEach(d => {
      catCounts[d.category] = (catCounts[d.category] || 0) + 1;
    });
  });

  let html = `<button class="cat-chip ${!activeCategory ? 'active' : ''}" onclick="filterCategory(null)" title="显示所有决策">全部决策</button>`;
  Object.entries(CATEGORIES).forEach(([cat, info]) => {
    if (catCounts[cat]) {
      html += `<button class="cat-chip ${activeCategory === cat ? 'active' : ''}" onclick="filterCategory('${cat}')" title="${info.desc}">
        ${info.icon} ${cat} <span class="cat-count">${catCounts[cat]}</span>
      </button>`;
    }
  });
  bar.innerHTML = html;
}

function filterCategory(cat) {
  activeCategory = cat;
  renderCategoryBar();
  renderMap();
}



// ===== RENDER MAP =====
function renderMap() {
  const ordered = getOrderedPeople();

  // Age axis
  const axisEl = document.getElementById('mapAgeAxis');
  axisEl.innerHTML = AGE_TICKS.map(age => {
    const pct = ageToPct(age);
    const stageLabel = age < 30 ? '青年' : age < 45 ? '壮年' : age < 60 ? '中年' : '晚年';
    return `<div class="map-age-tick" style="left:${pct}%">
      <div class="tick-line"></div>
      <div class="tick-label">${age}岁</div>
    </div>`;
  }).join('');

  // Person labels
  const colEl = document.getElementById('mapPersonCol');
  colEl.innerHTML = ordered.map(([key, p]) => {
    const color = personColors[key] || '#d4a853';
    return `<div class="map-person-item" onclick="selectPerson('${key}')">
      <span class="mpi-avatar">${p.avatar}</span>
      <div><div class="mpi-name">${p.name}</div><div class="mpi-era">${p.eraLabel} · ${p.lifespan}</div></div>
      <div class="mpi-color-bar" style="background:${color}"></div>
    </div>`;
  }).join('');

  // Timeline area
  const areaEl = document.getElementById('mapTimeline');

  // Grid lines
  let gridHtml = AGE_TICKS.map(age => {
    const pct = ageToPct(age);
    return `<div class="map-grid-line" style="left:${pct}%"></div>`;
  }).join('');

  // Person rows
  let rowsHtml = ordered.map(([key, p]) => {
    const color = personColors[key] || '#d4a853';
    const birthYear = parseInt(p.lifespan.split('-')[0].trim());
    const deathPart = p.lifespan.split('-')[1].trim();
    const deathYear = deathPart === '至今' ? 2026 : parseInt(deathPart);
    const lifeStartPct = ageToPct(0);
    const lifeEndPct = ageToPct(Math.min(deathYear - birthYear, AGE_MAX));
    const lifeWidth = lifeEndPct - lifeStartPct;

    let visibleDecisions = activeCategory
      ? p.decisions.filter(d => d.category === activeCategory)
      : p.decisions;

    let dotsHtml = visibleDecisions.map(d => {
      const dotPct = ageToPct(d.age);
      const dotClass = d.outcomeType === 'good' ? 'dot-good' : d.outcomeType === 'bad' ? 'dot-bad' : 'dot-mixed';
      const catInfo = CATEGORIES[d.category] || { icon: '📌', color: '#888' };
      return `<div class="map-decision-group" style="left:${dotPct}%"
        onclick="showDetail('${key}', ${d.year})">
        <div class="map-dot ${dotClass}"></div>
        <div class="map-cat-label">${catInfo.icon} ${d.category}</div>
        <div class="map-year-label">${d.year}年</div>
      </div>`;
    }).join('');

    return `<div class="map-row">
      <div class="life-bar" style="left:${lifeStartPct}%;width:${lifeWidth}%;background:${color}"></div>
      ${dotsHtml}
    </div>`;
  }).join('');

  areaEl.innerHTML = gridHtml + rowsHtml;
}

// ===== DETAIL PANEL =====
function showDetail(personKey, year) {
  const p = people[personKey];
  const d = p.decisions.find(dec => dec.year === year);
  if (!d) return;

  const catInfo = CATEGORIES[d.category] || { icon: '📌', color: '#888' };
  const tagText = d.outcomeType === 'good' ? '正面' : d.outcomeType === 'bad' ? '负面' : '复杂';
  const tagClass = d.outcomeType === 'good' ? 'tag-good' : d.outcomeType === 'bad' ? 'tag-bad' : 'tag-mixed';

  // Find same-category decisions from other people
  const sameCategoryDecisions = [];
  Object.entries(people).forEach(([k, person]) => {
    if (k === personKey) return;
    person.decisions.forEach(dd => {
      if (dd.category === d.category) {
        sameCategoryDecisions.push({ personKey: k, person, decision: dd });
      }
    });
  });

  let html = `
    <div class="detail-person-header">
      <span class="dph-avatar">${p.avatar}</span>
      <div>
        <div class="dph-name">${p.name}</div>

      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
      <span style="font-size:14px;">${catInfo.icon}</span>
      <span style="font-size:14px;font-weight:600;color:${catInfo.color}">${d.category}</span>
      <span style="font-size:11px;color:var(--text-dim);">${catInfo.desc || ''}</span>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px;">
      <span class="outcome-tag ${tagClass}" style="padding:3px 12px;border-radius:10px;font-size:11px;">结果：${tagText}</span>
    </div>
    <div class="detail-context">${d.context}</div>
    <div class="detail-options">
      ${d.options.map((o, i) => `
        <div class="detail-option ${o.chosen ? 'is-chosen' : 'not-chosen'}">
          <span class="do-marker">${o.chosen ? '✓' : String.fromCharCode(65 + i)}</span>
          <div style="flex:1;">
            <div>${o.text}</div>
            ${o.bestGain ? `<div style="font-size:11px;color:var(--green);margin-top:4px;">📈 ${o.bestGain}</div>` : ''}
            ${o.worstLoss ? `<div style="font-size:11px;color:var(--red);margin-top:2px;">📉 ${o.worstLoss}</div>` : ''}
          </div>
        </div>`).join('')}
    </div>
    ${d.options.some(o => o.metrics) ? `
    <div class="decision-matrix" style="margin-bottom:16px;">
      <div style="padding:8px 12px;font-size:11px;color:var(--gold);font-weight:600;border-bottom:1px solid rgba(212,168,83,0.15);">决策分析矩阵（短期/长期）</div>
      <table>
        <thead>
          <tr>
            <th style="text-align:left;padding-left:10px;">选项</th>
            <th>💰财富</th>
            <th>📈成长</th>
            <th>😊幸福</th>
            <th>⚡风险</th>
            <th>🌟影响</th>
          </tr>
        </thead>
        <tbody>
          ${d.options.map((o, i) => {
            const isChosen = o.chosen;
            const rowClass = isChosen ? 'matrix-chosen' : '';
            let cells = '';
            if (o.metrics) {
              ['wealth','growth','happiness','risk','influence'].forEach(key => {
                const val = o.metrics[key];
                if (val) {
                  const sClass = val.short > 0 ? 'matrix-score-high' : val.short === 0 ? 'matrix-score-medium' : 'matrix-score-low';
                  const lClass = val.long > 0 ? 'matrix-score-high' : val.long === 0 ? 'matrix-score-medium' : 'matrix-score-low';
                  cells += `<td><span class="matrix-score ${sClass}">${val.short > 0 ? '+' : ''}${val.short}</span>/<span class="matrix-score ${lClass}">${val.long > 0 ? '+' : ''}${val.long}</span></td>`;
                } else {
                  cells += `<td style="color:var(--text-dim);">—</td>`;
                }
              });
            } else {
              cells = `<td colspan="5" style="color:var(--text-dim);">无数据</td>`;
            }
            return `<tr class="${rowClass}"><td style="text-align:left;padding-left:10px;max-width:120px;font-size:10px;">${isChosen ? '✓ ' : ''}${o.text.substring(0, 15)}${o.text.length > 15 ? '...' : ''}</td>${cells}</tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>` : ''}
    <div class="detail-outcome-box">
      <div class="dob-label">决策结果</div>
      <div class="dob-text">${d.outcome}</div>
    </div>
    ${d.insight ? `
    <div class="detail-insight-box">
      <div class="dib-label">💡 智慧启示</div>
      <div class="dib-text">${d.insight}</div>
    </div>` : ''}`;

  // Cross-person comparison
  if (sameCategoryDecisions.length > 0) {
    html += `
    <div class="detail-compare-section">
      <h4>🔍 同类决策对比：${catInfo.icon} "${d.category}"</h4>
      ${sameCategoryDecisions.map(({ personKey: k, person: pp, decision: dd }) => {
        const chosenText = dd.options.find(o => o.chosen)?.text || '';
        const dTagText = dd.outcomeType === 'good' ? '正面' : dd.outcomeType === 'bad' ? '负面' : '复杂';
        const dTagClass = dd.outcomeType === 'good' ? 'tag-good' : dd.outcomeType === 'bad' ? 'tag-bad' : 'tag-mixed';
        return `<div class="compare-person-row">
          <span class="cpr-avatar">${pp.avatar}</span>
          <div>
            <div class="cpr-name">${pp.name} · ${dd.age}岁 · ${dd.year}年 <span class="outcome-tag ${dTagClass}" style="padding:1px 6px;border-radius:8px;font-size:10px;">${dTagText}</span></div>
            <div class="cpr-context">${dd.context}</div>
            <div class="cpr-choice">✓ ${chosenText}</div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }

  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('detailOverlay').classList.add('visible');
  document.getElementById('detailPanel').classList.add('visible');
}

let curveSelectedPeople = ['susshi'];
let curveSelectedDimensions = ['wealth', 'growth', 'happiness', 'risk', 'influence'];
let curveColorMode = 'person'; // 'person' or 'dimension'
let curveTimeRange = 'short'; // 'short' or 'long'

const DIMENSION_COLORS = {
  wealth: '#f0d48a',
  growth: '#5b9aff',
  happiness: '#34d399',
  risk: '#f87171',
  influence: '#a78bfa'
};

const PERSON_COLORS = {
  susshi: '#f0d48a',
  zengguofan: '#5b9aff',
  zhangyimou: '#34d399',
  jobs: '#a78bfa',
  jackma: '#fb923c',
  wangyangming: '#ec4899',
  renzhengfei: '#14b8a6',
  elonmusk: '#8b5cf6',
  libai: '#f59e0b'
};

function setColorMode(mode) {

  document.querySelectorAll('.color-mode-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });

}

function setTimeRange(range) {
  curveTimeRange = range;
  document.querySelectorAll('.time-range-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.range === range);
  });

}

function initCurveView() {
  renderPersonCheckboxes();
  renderDimensionCheckboxes();
  drawScoreCurves();
}

function renderPersonCheckboxes() {
  const container = document.getElementById('personCheckboxes');
  let html = '';
  Object.entries(people).forEach(([key, person]) => {
    const checked = curveSelectedPeople.includes(key) ? 'checked' : '';

function renderDimensionCheckboxes() {
  const container = document.getElementById('dimensionCheckboxes');

    { key: 'growth', label: '📈 成长' },
    { key: 'happiness', label: '😊 幸福' },

  ];

function togglePersonCurve(key) {
  const idx = curveSelectedPeople.indexOf(key);
  if (idx >= 0) {
    curveSelectedPeople.splice(idx, 1);
  } else {
    curveSelectedPeople.push(key);
  }
  renderPersonCheckboxes();
  drawScoreCurves();
}

function toggleDimensionCurve(key) {
  const idx = curveSelectedDimensions.indexOf(key);
  if (idx >= 0) {
    curveSelectedDimensions.splice(idx, 1);
  } else {
    curveSelectedDimensions.push(key);
  }
  renderDimensionCheckboxes();
  drawScoreCurves();
}

function extractPersonCurveData(personKey) {
  const person = people[personKey];
  if (!person) return [];
  
  const data = [];
  person.decisions.forEach(decision => {
    const chosenOption = decision.options.find(o => o.chosen);
    if (chosenOption && chosenOption.metrics) {
      data.push({
        age: decision.age,
        year: decision.year,
        category: decision.category,
        metrics: chosenOption.metrics
      });
    }
  });
  
  return data.sort((a, b) => a.age - b.age);
}

function drawScoreCurves() {
  const canvas = document.getElementById('scoreCurveCanvas');
  const ctx = canvas.getContext('2d');
  
  const width = canvas.width;
  const height = canvas.height;
  const padding = { top: 60, right: 40, bottom: 80, left: 80 };
  
  ctx.clearRect(0, 0, width, height);
  
  if (curveSelectedPeople.length === 0 || curveSelectedDimensions.length === 0) {
    ctx.fillStyle = '#7a8498';
    ctx.font = '16px "Noto Sans SC"';
    ctx.textAlign = 'center';
    ctx.fillText('请至少选择一个人物和一个维度', width / 2, height / 2);
    return;
  }
  
  const chartWidth = width - padding.left - padding.right;
  const chartHeight = height - padding.top - padding.bottom;
  
  const allData = [];
  curveSelectedPeople.forEach(personKey => {
    const data = extractPersonCurveData(personKey);
    allData.push(...data);
  });
  
  if (allData.length === 0) {
    ctx.fillStyle = '#7a8498';
    ctx.font = '16px "Noto Sans SC"';
    ctx.textAlign = 'center';
    ctx.fillText('暂无数据', width / 2, height / 2);
    return;
  }
  
  const minAge = Math.min(...allData.map(d => d.age));
  const maxAge = Math.max(...allData.map(d => d.age));
  const ageRange = maxAge - minAge || 1;
  
  ctx.strokeStyle = 'rgba(212, 168, 83, 0.2)';
  ctx.lineWidth = 1;
  
  // Y轴刻度：-2到+2（-2在底部，+2在顶部）
  const yTicks = [-2, -1, 0, 1, 2];
  
  yTicks.forEach((tickVal, i) => {
    const normalizedTick = (tickVal + 2) / 4; // -2->0, 0->0.5, +2->1
    const y = padding.top + chartHeight - normalizedTick * chartHeight;
    ctx.beginPath();
    ctx.moveTo(padding.left, y);
    ctx.lineTo(width - padding.right, y);
    ctx.stroke();
    
    ctx.fillStyle = tickVal === 0 ? '#d4a853' : '#7a8498';
    ctx.font = tickVal === 0 ? 'bold 13px "Noto Sans SC"' : '12px "Noto Sans SC"';
    ctx.textAlign = 'right';
    ctx.fillText((tickVal > 0 ? '+' : '') + tickVal.toString(), padding.left - 10, y + 4);
  });
  
  // 零线高亮
  const zeroY = padding.top + chartHeight / 2;
  ctx.strokeStyle = 'rgba(212, 168, 83, 0.4)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([5, 5]);
  ctx.beginPath();
  ctx.moveTo(padding.left, zeroY);
  ctx.lineTo(width - padding.right, zeroY);
  ctx.stroke();
  ctx.setLineDash([]);
  
  const ageStep = chartWidth / Math.max(1, ageRange);
  for (let age = minAge; age <= maxAge; age += Math.max(1, Math.floor(ageRange / 10))) {
    const x = padding.left + (age - minAge) * ageStep;
    ctx.strokeStyle = 'rgba(212, 168, 83, 0.1)';
    ctx.beginPath();
    ctx.moveTo(x, padding.top);
    ctx.lineTo(x, height - padding.bottom);
    ctx.stroke();
    
    ctx.fillStyle = '#7a8498';
    ctx.font = '12px "Noto Sans SC"';
    ctx.textAlign = 'center';
    ctx.fillText(age + '岁', x, height - padding.bottom + 20);
  }
  
  // 主标题
  ctx.fillStyle = '#d4a853';
  ctx.font = 'bold 18px "Noto Serif SC"';
  ctx.textAlign = 'center';
  const timeRangeText = curveTimeRange === 'short' ? '短期影响（1-2年内）' : '长期影响（5年以上）';
  ctx.fillText(`决策变化分曲线 · ${timeRangeText}`, width / 2, 28);

  // 副标题：解释评分含义
  ctx.fillStyle = '#7a8498';
  ctx.font = '11px "Noto Sans SC"';
  ctx.textAlign = 'center';
  ctx.fillText('+2 大幅提升 | +1 提升 | 0 无变化 | -1 下降 | -2 大幅下降', width / 2, 48);

  // X轴标签
  ctx.fillStyle = '#7a8498';
  ctx.font = '12px "Noto Sans SC"';
  ctx.textAlign = 'center';
  ctx.fillText('决策时的年龄', width / 2, height - 15);

  // Y轴标签
  ctx.save();
  ctx.translate(18, height / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText('变化幅度', 0, 0);
  ctx.restore();
  
  curveSelectedPeople.forEach((personKey, personIdx) => {
    const personData = extractPersonCurveData(personKey);
    const personColor = PERSON_COLORS[personKey] || '#d4a853';
    
    curveSelectedDimensions.forEach((dimKey, dimIdx) => {
      const dimColor = DIMENSION_COLORS[dimKey];
      const offset = (dimIdx - (curveSelectedDimensions.length - 1) / 2) * 8;
      
      // 根据颜色模式选择颜色
      const lineColor = curveColorMode === 'person' ? personColor : dimColor;
      
      ctx.strokeStyle = lineColor;
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.7;
      
      ctx.beginPath();
      let started = false;
      
      personData.forEach((point, idx) => {
        const x = padding.left + (point.age - minAge) * ageStep;
        const metricObj = point.metrics[dimKey];
        const value = metricObj ? (metricObj[curveTimeRange] || 0) : 0;
        // 映射-2到+2到图表高度
        const normalizedValue = (value + 2) / 4; // -2->0, 0->0.5, +2->1
        const y = padding.top + chartHeight - normalizedValue * chartHeight + offset;
        
        if (!started) {
          ctx.moveTo(x, y);
          started = true;
        } else {
          ctx.lineTo(x, y);
        }
      });
      
      ctx.stroke();
      
      personData.forEach((point, idx) => {
        const x = padding.left + (point.age - minAge) * ageStep;
        const metricObj = point.metrics[dimKey];
        const value = metricObj ? (metricObj[curveTimeRange] || 0) : 0;
        const normalizedValue = (value + 2) / 4;
        const y = padding.top + chartHeight - normalizedValue * chartHeight + offset;
        
        ctx.fillStyle = lineColor;
        ctx.beginPath();
        ctx.arc(x, y, 4, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.fillStyle = '#0c1017';
        ctx.beginPath();
        ctx.arc(x, y, 2, 0, Math.PI * 2);
        ctx.fill();
      });
      
      ctx.globalAlpha = 1;
    });
  });
  
  renderCurveLegend();
}

// ===== CURVE TOOLTIP =====
(function() {
  const canvas = document.getElementById('scoreCurveCanvas');
  const tooltip = document.getElementById('curveTooltip');

  canvas.addEventListener('click', function(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;

    const width = canvas.width;
    const height = canvas.height;
    const padding = { top: 60, right: 40, bottom: 80, left: 80 };
    const chartWidth = width - padding.left - padding.right;
    const chartHeight = height - padding.top - padding.bottom;

    const allData = [];
    curveSelectedPeople.forEach(personKey => {
      const data = extractPersonCurveData(personKey);
      data.forEach(d => { d.personKey = personKey; });
      allData.push(...data);
    });

    if (allData.length === 0) { tooltip.style.display = 'none'; return; }

    const minAge = Math.min(...allData.map(d => d.age));
    const maxAge = Math.max(...allData.map(d => d.age));
    const ageRange = maxAge - minAge || 1;
    const ageStep = chartWidth / Math.max(1, ageRange);

    let closest = null;
    let minDist = 30 * scaleX; // scale threshold

    allData.forEach(d => {
      const x = padding.left + (d.age - minAge) * ageStep;
      curveSelectedDimensions.forEach((dimKey, dimIdx) => {
        const offset = (dimIdx - (curveSelectedDimensions.length - 1) / 2) * 8;
        const metricObj = d.metrics[dimKey];
        const value = metricObj ? (metricObj[curveTimeRange] || 0) : 0;
        const normalizedValue = (value + 2) / 4;
        const y = padding.top + chartHeight - normalizedValue * chartHeight + offset;

        const dist = Math.sqrt((mx - x) ** 2 + (my - y) ** 2);
        if (dist < minDist) {
          minDist = dist;
          closest = { d, dimKey, value, x, y };
        }
      });
    });

    if (closest) {
      const person = people[closest.d.personKey];
      const dimLabels = { wealth: "💰 财富", growth: "📈 成长", happiness: "😊 幸福", risk: "⚡️ 风险", influence: "🌟 影响" };
      const chosenOption = person.decisions.find(dec => dec.year === closest.d.year)?.options.find(o => o.chosen);
      const decisionText = chosenOption ? chosenOption.text : '';

      let html = `<div style="font-weight:600;color:#d4a853;margin-bottom:4px;">${person.avatar} ${person.name} · ${closest.d.age}岁 · ${closest.d.year}年</div>`;
      html += `<div style="font-size:12px;color:#d4dae6;margin-bottom:4px;">${closest.d.category}</div>`;
      if (decisionText) {
        html += `<div style="font-size:11px;color:#a0aab8;margin-bottom:6px;">✓ ${decisionText}</div>`;
      }
      const valStr = closest.value > 0 ? `+${closest.value}` : `${closest.value}`;
      html += `<div style="font-size:12px;color:${closest.value > 0 ? '#34d399' : closest.value < 0 ? '#f87171' : '#d4a853'};">${dimLabels[closest.dimKey] || closest.dimKey}：${valStr}（${curveTimeRange === 'short' ? '短期' : '长期'}）</div>`;

      tooltip.innerHTML = html;
      tooltip.style.display = 'block';

      // Position in display coordinates
      let tx = (closest.x / scaleX) + 15;
      let ty = (closest.y / scaleY) - 10;
      if (tx + 280 > rect.width) tx = (closest.x / scaleX) - 290;
      if (ty < 0) ty = 10;
      tooltip.style.left = tx + 'px';
      tooltip.style.top = ty + 'px';
    } else {
      tooltip.style.display = 'none';
    }
  });

  canvas.addEventListener('mouseleave', function() {
    // keep tooltip visible after click; only hide when clicking elsewhere
  });

  document.addEventListener('click', function(e) {
    if (!canvas.contains(e.target) && !tooltip.contains(e.target)) {
      tooltip.style.display = 'none';
    }
  });
})();

renderCategoryBar();
renderMap();
</script>
</body>
</html>
